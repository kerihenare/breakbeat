services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: breakbeat
      POSTGRES_PASSWORD: breakbeat
      POSTGRES_DB: breakbeat
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breakbeat"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    command: ["--storageDataPath=/vlogs"]
    ports: ["9428:9428"]
    volumes: ["vldata:/vlogs"]

  bugsink:
    image: bugsink/bugsink:latest
    environment:
      # Must be >= 50 chars with varied characters (Bugsink runs Django's
      # --fail-level WARNING deploy check at start). Dev-only; change for any
      # non-local use.
      SECRET_KEY: bsink_dev_2c1f9a47e3b86d05f7a219c4e8d63b0a5471fe92ac38d6b0
      CREATE_SUPERUSER: "admin@example.com:admin"
      BEHIND_HTTPS: "false"
    ports: ["8000:8000"]
    volumes: ["bugsinkdata:/data"]

  app:
    build: .
    command: sh -c "pnpm db:migrate && pnpm dev"
    environment:
      DATABASE_URL: postgres://breakbeat:breakbeat@postgres:5432/breakbeat
      REDIS_URL: redis://redis:6379
      VICTORIALOGS_URL: http://victorialogs:9428
    env_file: [.env]
    ports: ["3000:3000"]
    volumes: ["./:/app", "/app/node_modules"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: .
    command: pnpm worker
    environment:
      DATABASE_URL: postgres://breakbeat:breakbeat@postgres:5432/breakbeat
      REDIS_URL: redis://redis:6379
      VICTORIALOGS_URL: http://victorialogs:9428
    env_file: [.env]
    volumes: ["./:/app", "/app/node_modules"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  pgdata:
  vldata:
  bugsinkdata:
